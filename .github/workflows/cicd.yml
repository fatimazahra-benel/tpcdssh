name: CI/CD Flask Docker
on:
  push:
    branches:
      - main
jobs:
  cd:
    name: Docker Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: set up Docker
        uses: docker/setup-buildx-action@v2
      - name: Login Docker Hub
        uses: docker/Login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: | 
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flask_devops_demo:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask_devops_demo:latest
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
          "powershell -ExecutionPolicy Bypass -File 'C:\Users\vPro\cdssh\deploy.ps1' -DockerUser ${{ secrets.DOCKERHUB_USERNAME }} -DockerToken ${{ secrets.DOCKERHUB_TOKEN }}"
          
          
